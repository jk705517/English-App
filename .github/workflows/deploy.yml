name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Setup aliyun oss
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: oss-cn-hangzhou.aliyuncs.com
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      
      - name: Deploy to OSS
        run: ossutil cp -r ./dist oss://biubiu-web/ --force --update

      # 给 SW / 入口 HTML / manifest 设 Cache-Control: no-cache，
      # 让浏览器每次都问服务器要最新——这是「老用户拿不到新版」的根治
      - name: Set no-cache headers on critical files
        run: |
          ossutil set-meta oss://biubiu-web/sw.js Cache-Control:no-cache --update --force
          ossutil set-meta oss://biubiu-web/registerSW.js Cache-Control:no-cache --update --force
          ossutil set-meta oss://biubiu-web/index.html Cache-Control:no-cache --update --force
          ossutil set-meta oss://biubiu-web/manifest.webmanifest Cache-Control:no-cache --update --force